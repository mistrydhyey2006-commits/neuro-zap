<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- ── Primary SEO ── -->
  <title>Free IQ Test Online — Neuro Zap | Get Your IQ Score Instantly</title>
  <meta name="description" content="Take a free IQ test online with 20 real questions covering pattern recognition, spatial reasoning, logic and memory. Get your IQ score instantly. No signup required!"/>
  <meta name="keywords" content="free IQ test, online IQ test, IQ score, intelligence test, brain test, IQ quiz, pattern recognition, logical reasoning, spatial reasoning"/>
  <meta name="robots" content="index, follow"/>
  <meta name="google-site-verification" content="AQhscoN2t2IRamAfTwKbBBOsRKcQCpjjD-Reeybxum8" />
  
  <link rel="canonical" href="https://neuro-zap.vercel.app/"/>

  <!-- ── Open Graph (WhatsApp, Facebook) ── -->
  <meta property="og:type"        content="website"/>
  <meta property="og:url"         content="https://neuro-zap.vercel.app/"/>
  <meta property="og:title"       content="Free IQ Test Online — Neuro Zap"/>
  <meta property="og:description" content="20 real IQ questions. Get your IQ score instantly. Free, no signup required!"/>
  <meta property="og:image"       content="https://neuro-zap.vercel.app/og-image.png"/>

  <!-- ── Twitter Card ── -->
  <meta name="twitter:card"        content="summary_large_image"/>
  <meta name="twitter:title"       content="Free IQ Test Online — Neuro Zap"/>
  <meta name="twitter:description" content="20 real IQ questions. Get your IQ score instantly. Free, no signup required!"/>
  <meta name="twitter:image"       content="https://neuro-zap.vercel.app/og-image.png"/>

  <!-- ── Structured Data (JSON-LD) ── -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Neuro Zap IQ Test",
    "url": "https://neuro-zap.vercel.app/",
    "description": "Free online IQ test with 20 real questions covering pattern recognition, spatial reasoning, logic and memory. Get your IQ score instantly.",
    "applicationCategory": "EducationalApplication",
    "operatingSystem": "All",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "INR"
    },
    "aggregateRating": {
      "@type": "AggregateRating",
      "ratingValue": "4.8",
      "ratingCount": "120"
    }
  }
  </script>

  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <button class="theme-toggle" id="darkToggle" aria-label="Toggle dark mode">
    <span class="t-sun">☀️</span>
    <span class="t-moon">🌙</span>
    <span class="t-knob"></span>
  </button>

  <div class="page">
    <div class="card text-center">

      <div class="home-logo">Neuro<span style="color:var(--text)">Zap</span></div>
      <p class="home-sub">Real IQ questions · Leaderboard · Daily Challenge</p>

      <!-- Daily Challenge Banner -->
      <div class="daily-banner" id="dailyBanner">
        <div>
          <div class="daily-badge">🔥 Daily Challenge</div>
          <div class="daily-banner-title" style="margin-top:0.3rem">Today's Brain Teaser</div>
          <div class="daily-banner-text" id="dailyPreview">Loading today's challenge...</div>
        </div>
        <a href="daily.html" class="btn" style="background:rgba(255,255,255,0.2);color:#fff;border-color:rgba(255,255,255,0.4);white-space:nowrap;flex-shrink:0">Play →</a>
      </div>

      <div class="home-stats">
        <div class="stat-box">
          <div class="stat-num">20</div>
          <div class="stat-label">Questions</div>
        </div>
        <div class="stat-box">
          <div class="stat-num">20<span style="font-size:1rem">min</span></div>
          <div class="stat-label">Time Limit</div>
        </div>
        <div class="stat-box">
          <div class="stat-num">IQ</div>
          <div class="stat-label">Score</div>
        </div>
      </div>

      <!-- Auth row — shown when NOT logged in -->
      <div class="auth-row" id="authRow">
        <a href="login.html" class="btn btn-outline">👤 Login</a>
        <a href="login.html#register" class="btn btn-ghost">✨ Register</a>
      </div>

      <!-- Logged in greeting -->
      <div class="hidden" id="userGreeting" style="margin-bottom:1rem;font-size:0.9rem;color:var(--text2)">
        👋 Welcome back, <strong id="greetName" style="color:var(--accent)"></strong>!
        <a href="#" onclick="doLogout()" style="color:var(--text2);font-size:0.8rem;margin-left:0.5rem">Logout</a>
      </div>

      <div class="home-buttons">
        <a href="test.html" class="btn btn-primary btn-full">🧠 Start Full IQ Test</a>
        <a href="leaderboard.html" class="btn btn-outline btn-full">🏆 View Leaderboard</a>
      </div>

    </div>

    <!-- SEO content unchanged -->
    <!-- (kept exactly same intentionally for ranking consistency) -->

  </div>

  <script src="script.js"></script>
  <script>
    initDarkMode();
    checkHomeAuth();
    loadDailyPreview();

    function checkHomeAuth() {
      const token = localStorage.getItem('nzToken');
      const name  = localStorage.getItem('nzUsername');
      if (token && name) {
        document.getElementById('authRow').classList.add('hidden');
        document.getElementById('userGreeting').classList.remove('hidden');
        document.getElementById('greetName').textContent = name;
      }
    }

    function doLogout() {
      localStorage.removeItem('nzToken');
      localStorage.removeItem('nzUsername');
      window.location.reload();
    }

    async function loadDailyPreview() {
      try {
        const res  = await fetch('/api/daily');
        const data = await res.json();
        document.getElementById('dailyPreview').textContent =
          data.question ? data.question.substring(0, 60) + '…' : 'One special question awaits!';
      } catch {
        document.getElementById('dailyPreview').textContent = 'One special question awaits!';
      }
    }
  </script>
</body>
</html>
