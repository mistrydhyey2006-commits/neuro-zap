<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neuro Zap — Daily Challenge</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <button class="theme-toggle" id="darkToggle" aria-label="Toggle dark mode">
    <span class="t-sun">☀️</span>
    <span class="t-moon">🌙</span>
    <span class="t-knob"></span>
  </button>

  <div class="page">

    <!-- QUESTION CARD -->
    <div class="card" id="dailyCard" style="max-width:520px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">
        <a href="index.html" class="btn btn-ghost btn-sm">← Home</a>
        <div class="daily-chip" style="margin:0">🔥 Daily Challenge</div>
        <div id="dailyDate" style="font-size:0.8rem;color:var(--text2)"></div>
      </div>

      <div id="loadingState" style="text-align:center;padding:2rem;color:var(--text2)">
        Loading today's challenge... 🧠
      </div>

      <div id="questionState" class="hidden">
        <div id="qImageWrapD" style="display:none;margin-bottom:1rem;text-align:center">
          <img id="qImageD" src="" alt="Question image" style="max-width:100%;max-height:220px;border-radius:12px;border:1.5px solid var(--border);object-fit:contain"/>
        </div>
        <p class="question-text" id="dailyQText"></p>
        <div class="options-grid" id="dailyOptions"></div>
        <button class="btn btn-primary btn-full" id="submitBtn" onclick="submitAnswer()" disabled style="opacity:0.5">
          Submit Answer
        </button>
      </div>

      <div id="alreadyDone" class="hidden" style="text-align:center;padding:1rem">
        <div style="font-size:2.5rem;margin-bottom:0.75rem">✅</div>
        <h3 style="font-family:'Syne',sans-serif;margin-bottom:0.5rem">Already completed today!</h3>
        <p style="color:var(--text2);font-size:0.9rem;margin-bottom:1.5rem">Come back tomorrow for a new challenge.</p>
        <a href="index.html" class="btn btn-primary">🏠 Back to Home</a>
      </div>
    </div>

    <!-- RESULT CARD -->
    <div class="card hidden text-center" id="dailyResult" style="max-width:520px">
      <div id="resultEmoji" style="font-size:3rem;margin-bottom:0.75rem">🎯</div>
      <h2 style="font-family:'Syne',sans-serif;margin-bottom:0.5rem" id="resultTitle">Answer submitted!</h2>
      <p style="color:var(--text2);margin-bottom:0.5rem" id="resultMsg"></p>

      <div id="correctAnswerBox" style="background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;padding:1rem;margin:1rem 0;text-align:left">
        <div style="font-size:0.75rem;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.3rem">Correct Answer</div>
        <div id="correctAnswerText" style="font-weight:600;color:var(--accent)"></div>
      </div>

      <!-- Share -->
      <div class="share-row" style="justify-content:center;margin-bottom:1rem">
        <button class="btn btn-whatsapp btn-sm" onclick="shareDailyWhatsApp()">📱 WhatsApp</button>
        <button class="btn btn-twitter btn-sm" onclick="shareDailyTwitter()">🐦 Twitter</button>
        <button class="btn btn-copy btn-sm" onclick="copyDailyResult()">📋 Copy</button>
      </div>

      <a href="index.html" class="btn btn-outline btn-full">🏠 Back to Home</a>
    </div>

  </div>

  <script src="script.js"></script>
  <script>
    initDarkMode();

    const today    = new Date().toISOString().split('T')[0];
    const doneKey  = 'nzDaily_' + today;
    let   dailyData = null;
    let   selected  = null;

    document.getElementById('dailyDate').textContent = today;

    // Check if already done today
    if (localStorage.getItem(doneKey)) {
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('alreadyDone').classList.remove('hidden');
    } else {
      loadDailyQuestion();
    }

    async function loadDailyQuestion() {
      try {
        const res  = await fetch('/api/daily');
        dailyData  = await res.json();

        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('questionState').classList.remove('hidden');
        document.getElementById('dailyQText').textContent = dailyData.question;

        // Image
        if (dailyData.image_url) {
          document.getElementById('qImageD').src = dailyData.image_url;
          document.getElementById('qImageWrapD').style.display = 'block';
        }

        // Options
        const letters  = ['A','B','C','D'];
        const optionsEl = document.getElementById('dailyOptions');
        optionsEl.innerHTML = '';
        (dailyData.options || ['Option A','Option B','Option C','Option D']).forEach((opt, i) => {
          const btn = document.createElement('button');
          btn.className = 'option-btn';
          btn.innerHTML = `<span class="option-letter">${letters[i]}</span>${opt}`;
          btn.addEventListener('click', () => selectDailyAnswer(i, btn));
          optionsEl.appendChild(btn);
        });
      } catch {
        document.getElementById('loadingState').textContent = '⚠️ Could not load today\'s challenge. Try again later.';
      }
    }

    function selectDailyAnswer(i, btn) {
      selected = i;
      document.querySelectorAll('#dailyOptions .option-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = false;
      submitBtn.style.opacity = '1';
    }

    function submitAnswer() {
      if (selected === null) return;
      const correct  = dailyData.answer;
      const isCorrect = selected === correct;
      const letters  = ['A','B','C','D'];
      const opts     = dailyData.options || ['Option A','Option B','Option C','Option D'];

      // Mark today as done
      localStorage.setItem(doneKey, isCorrect ? 'correct' : 'wrong');

      // Show result
      document.getElementById('dailyCard').classList.add('hidden');
      const resultCard = document.getElementById('dailyResult');
      resultCard.classList.remove('hidden');

      document.getElementById('resultEmoji').textContent  = isCorrect ? '🎉' : '😅';
      document.getElementById('resultTitle').textContent  = isCorrect ? 'Correct!' : 'Not quite!';
      document.getElementById('resultMsg').textContent    = isCorrect
        ? 'You solved today\'s brain teaser! Come back tomorrow for another.'
        : 'Better luck tomorrow! Here\'s the correct answer:';
      document.getElementById('correctAnswerText').textContent =
        `${letters[correct]}: ${opts[correct]}`;
    }

    // Share functions
    function buildDailyShareText(isCorrect) {
      const status = isCorrect ? '✅ Got it right!' : '❌ Missed it!';
      return `🔥 Neuro Zap Daily Challenge — ${today}\n${status}\n\nTry today's challenge 👉 ${window.location.origin}/daily.html`;
    }

    function shareDailyWhatsApp() {
      const done = localStorage.getItem(doneKey);
      window.open('https://wa.me/?text=' + encodeURIComponent(buildDailyShareText(done === 'correct')), '_blank');
    }

    function shareDailyTwitter() {
      const done = localStorage.getItem(doneKey);
      window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(buildDailyShareText(done === 'correct')), '_blank');
    }

    function copyDailyResult() {
      const done = localStorage.getItem(doneKey);
      navigator.clipboard.writeText(buildDailyShareText(done === 'correct')).then(() => {
        const btn = document.querySelector('.btn-copy');
        if (btn) { btn.textContent = '✅ Copied!'; setTimeout(() => btn.textContent = '📋 Copy', 2000); }
      });
    }
  </script>
</body>
</html>
