<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neuro Zap — Daily Challenge</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <button class="theme-toggle" id="darkToggle" aria-label="Toggle dark mode">
    <span class="t-sun">☀️</span>
    <span class="t-moon">🌙</span>
    <span class="t-knob"></span>
  </button>

  <div class="page">

    <!-- QUESTION CARD -->
    <div class="card" id="dailyCard" style="max-width:560px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem">
        <div class="daily-chip" style="margin:0">🔥 Daily Challenge</div>
        <span id="dailyDate" style="font-size:0.82rem;color:var(--text2)"></span>
      </div>

      <div id="loadingState" style="text-align:center;padding:2rem;color:var(--text2)">
        Loading today's challenge...
      </div>

      <div id="questionState" class="hidden">
        <p class="question-text" id="dcQuestion"></p>
        <div class="options-grid" id="dcOptions"></div>
        <button class="btn btn-primary btn-full" id="submitBtn" onclick="submitDaily()" disabled style="opacity:0.5">
          Submit Answer
        </button>
      </div>

      <div id="noQuestionState" class="hidden" style="text-align:center;padding:2rem">
        <div style="font-size:2.5rem;margin-bottom:1rem">😴</div>
        <p style="color:var(--text2);margin-bottom:1rem">No daily challenge set for today yet.<br/>Check back later!</p>
        <a href="index.html" class="btn btn-outline">← Back to Home</a>
      </div>

      <div id="resultState" class="hidden" style="text-align:center">
        <div id="dcResultIcon" style="font-size:3rem;margin-bottom:0.75rem"></div>
        <div id="dcResultTitle" style="font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:700;margin-bottom:0.5rem"></div>
        <div id="dcResultMsg" style="color:var(--text2);font-size:0.95rem;margin-bottom:1.25rem"></div>

        <!-- Show correct answer -->
        <div id="dcAnswerReveal" style="
          background:var(--surface2);border:1.5px solid var(--border);
          border-radius:12px;padding:1rem;margin-bottom:1.25rem;text-align:left
        ">
          <div style="font-size:0.78rem;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:0.4rem">Correct Answer</div>
          <div id="dcCorrectAnswer" style="font-weight:600;color:var(--correct,#2d9e6b);font-size:1rem"></div>
        </div>

        <div class="share-row" style="justify-content:center;margin-bottom:1rem">
          <button class="btn btn-whatsapp btn-sm" onclick="shareDailyResult()">📱 Share</button>
          <button class="btn btn-copy btn-sm" onclick="copyDailyResult()">📋 Copy</button>
        </div>

        <a href="test.html" class="btn btn-primary btn-full">🧠 Take Full IQ Test</a>
        <a href="index.html" class="btn btn-outline btn-full mt-1">🏠 Back to Home</a>
      </div>

      <div id="alreadyDoneState" class="hidden" style="text-align:center;padding:1rem">
        <div style="font-size:2.5rem;margin-bottom:0.75rem">✅</div>
        <p style="font-weight:600;margin-bottom:0.5rem">You already completed today's challenge!</p>
        <p style="color:var(--text2);font-size:0.9rem;margin-bottom:1.25rem">Come back tomorrow for a new one 🔥</p>
        <a href="test.html" class="btn btn-primary btn-full">🧠 Take Full IQ Test</a>
        <a href="index.html" class="btn btn-outline btn-full mt-1">🏠 Back to Home</a>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
  <script>
    initDarkMode();

    const today        = new Date().toISOString().split('T')[0];
    const storageKey   = 'nz_daily_' + today;
    let   dailyData    = null;
    let   selectedAns  = null;

    // Show today's date
    document.getElementById('dailyDate').textContent = new Date().toLocaleDateString('en-IN', { weekday:'long', day:'numeric', month:'long' });

    // Check if already done today
    if (localStorage.getItem(storageKey)) {
      showState('alreadyDone');
    } else {
      loadDaily();
    }

    async function loadDaily() {
      try {
        const res  = await fetch('/api/daily');
        dailyData  = await res.json();

        if (!dailyData.question) {
          showState('noQuestion');
          return;
        }

        document.getElementById('dcQuestion').textContent = dailyData.question;
        const letters = ['A','B','C','D'];
        const grid = document.getElementById('dcOptions');
        grid.innerHTML = '';
        dailyData.options.forEach((opt, i) => {
          const btn = document.createElement('button');
          btn.className = 'option-btn';
          btn.innerHTML = `<span class="option-letter">${letters[i]}</span>${opt}`;
          btn.addEventListener('click', () => selectOption(i, btn));
          grid.appendChild(btn);
        });

        showState('question');
      } catch {
        document.getElementById('loadingState').textContent = '❌ Could not load challenge. Check your connection.';
      }
    }

    function selectOption(index, btn) {
      document.querySelectorAll('#dcOptions .option-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedAns = index;
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = false;
      submitBtn.style.opacity = '1';
    }

    function submitDaily() {
      if (selectedAns === null) return;
      const correct = selectedAns === dailyData.answer;
      const letters = ['A','B','C','D'];

      // Mark correct/wrong visually
      document.querySelectorAll('#dcOptions .option-btn').forEach((btn, i) => {
        if (i === dailyData.answer) btn.style.borderColor = '#2d9e6b';
        if (i === selectedAns && !correct) btn.style.borderColor = '#e05c5c';
      });

      // Save to localStorage so they can't redo today
      localStorage.setItem(storageKey, JSON.stringify({ answer: selectedAns, correct }));

      // Show result after short delay
      setTimeout(() => {
        if (correct) {
          document.getElementById('dcResultIcon').textContent = '🎉';
          document.getElementById('dcResultTitle').textContent = 'Correct!';
          document.getElementById('dcResultTitle').style.color = '#2d9e6b';
          document.getElementById('dcResultMsg').textContent = "Brilliant! You got today's challenge right!";
        } else {
          document.getElementById('dcResultIcon').textContent = '😅';
          document.getElementById('dcResultTitle').textContent = 'Not quite!';
          document.getElementById('dcResultTitle').style.color = '#e05c5c';
          document.getElementById('dcResultMsg').textContent = "Better luck tomorrow! Here's the correct answer:";
        }

        document.getElementById('dcCorrectAnswer').textContent =
          `${letters[dailyData.answer]}: ${dailyData.options[dailyData.answer]}`;

        showState('result');
      }, 800);
    }

    function showState(name) {
      ['loading','question','noQuestion','result','alreadyDone'].forEach(s => {
        document.getElementById(s + 'State').classList.add('hidden');
      });
      document.getElementById(name + 'State').classList.remove('hidden');
    }

    function shareDailyResult() {
      const saved = JSON.parse(localStorage.getItem(storageKey) || '{}');
      const text = saved.correct
        ? `🔥 I got today's Neuro Zap Daily Challenge right! 🎉\nCan you beat it? 👉 ${window.location.origin}/daily.html`
        : `🔥 Tried today's Neuro Zap Daily Challenge!\nThink you can get it? 👉 ${window.location.origin}/daily.html`;
      window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
    }

    function copyDailyResult() {
      const saved = JSON.parse(localStorage.getItem(storageKey) || '{}');
      const text = saved.correct
        ? `🔥 I got today's Neuro Zap Daily Challenge right! 🎉\n${window.location.origin}/daily.html`
        : `🔥 Tried today's Neuro Zap Daily Challenge!\n${window.location.origin}/daily.html`;
      navigator.clipboard.writeText(text).then(() => showToast('📋 Copied!'));
    }

    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2500);
    }
  </script>
</body>
</html>
